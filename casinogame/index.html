<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberChips Poker Club</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .poker-table {
            background: radial-gradient(circle, #1b4d3e 0%, #0f2e24 100%);
            border: 16px solid #3d2314;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
        }

        /* --- ЗАЛІЗОБЕТОННИЙ СТИЛЬ ДЛЯ КОМП'ЮТЕРІВ (ПК) --- */
        @media (min-width: 768px) {
            /* Повертаємо столу на ПК вигляд класичного овалу */
            .poker-table {
                display: block !important;
                position: relative !important;
                height: 420px !important;
                width: 100% !important;
                max-w: 56rem !important; /* max-w-4xl */
                border-radius: 150px !important;
                padding: 0 !important;
            }

            /* Повертаємо абсолютні координати для ботів на великому столі */
            
            /* Бот 1 (Агресор) — зліва по центру */
            .poker-table > div:nth-child(1) {
                position: absolute !important;
                left: 1.5rem !important; /* left-6 */
                top: 50% !important;
                transform: translateY(-50%) !important;
                width: 9rem !important; /* w-36 */
                max-width: none !important;
            }

            /* Бот 2 (Профі) — зверху по центру */
            .poker-table > div:nth-child(2) {
                position: absolute !important;
                top: 1rem !important; /* top-4 */
                left: 50% !important;
                transform: translateX(-50%) !important;
                width: 9rem !important;
                max-width: none !important;
            }

            /* Бот 3 (Рандом) — справа по центру */
            .poker-table > div:nth-child(3) {
                position: absolute !important;
                right: 1.5rem !important; /* right-6 */
                top: 50% !important;
                transform: translateY(-50%) !important;
                width: 9rem !important;
                max-width: none !important;
            }

            /* Карти столу — чітко по центру овалу */
            .poker-table .flex {
                position: absolute !important;
                top: 50% !important;
                left: 50% !important;
                transform: translate(-50%, -50%) !important;
                margin-top: 0 !important;
            }

            /* Повертаємо картам на ПК їхній повноцінний великий розмір */
            .poker-table .w-10.h-14 {
                width: 3.5rem !important; /* w-14 */
                height: 5rem !important;  /* h-20 */
                font-size: 0.875rem !important; /* text-xs */
            }
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex flex-col justify-between">

    <header class="p-4 bg-gray-800 border-b border-gray-700 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold tracking-wider text-yellow-400">🎰 CYBERCHIPS POKER</h1>
        <div class="text-sm bg-gray-900 px-4 py-2 rounded-lg border border-gray-600">
            Загальний банк (POT): <span id="total-pot" class="font-bold text-green-400">0$</span>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-2 sm:p-4">
        <div class="poker-table w-full max-w-4xl rounded-[40px] md:rounded-[150px] p-4 md:p-0 grid grid-cols-2 md:block relative gap-4 md:gap-0 min-h-[460px] md:h-[420px]">
            
            <div class="static md:absolute md:left-6 md:top-1/2 md:-translate-y-1/2 text-center bg-black/40 p-2 md:p-3 rounded-lg border border-red-500/30 w-full max-w-[135px] md:w-36 justify-self-center z-10">
                <div class="font-bold text-sm md:text-base text-red-400">🤖 Бот 1 (Агресор)</div>
                <div id="bot1-status" class="text-xs text-gray-400 italic">Чекає...</div>
                <div class="text-sm text-yellow-500">Chips: 1000$</div>
            </div>

            <div class="col-span-2 static md:absolute md:top-4 md:left-1/2 md:-translate-x-1/2 text-center bg-black/40 p-2 md:p-3 rounded-lg border border-blue-500/30 w-full max-w-[135px] md:w-36 justify-self-center z-10">
                <div class="font-bold text-sm md:text-base text-blue-400">🤖 Бот 2 (Профі)</div>
                <div id="bot2-status" class="text-xs text-gray-400 italic">Чекає...</div>
                <div class="text-sm text-yellow-500">Chips: 1000$</div>
            </div>

            <div class="static md:absolute md:right-6 md:top-1/2 md:-translate-y-1/2 text-center bg-black/40 p-2 md:p-3 rounded-lg border border-purple-500/30 w-full max-w-[135px] md:w-36 justify-self-center z-10">
                <div class="font-bold text-sm md:text-base text-purple-400">🤖 Бот 3 (Рандом)</div>
                <div id="bot3-status" class="text-xs text-gray-400 italic">Чекає...</div>
                <div class="text-sm text-yellow-500">Chips: 1000$</div>
            </div>

            <div class="col-span-2 static md:absolute md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 flex gap-1 sm:gap-2 bg-black/30 p-2 sm:p-4 rounded-xl border border-white/5 justify-self-center mt-4 md:mt-0 z-0">
                <div class="w-10 h-14 sm:w-14 sm:h-20 bg-white/10 rounded-md border border-dashed border-white/30 flex items-center justify-center text-gray-500 text-[10px] sm:text-xs">Flop 1</div>
                <div class="w-10 h-14 sm:w-14 sm:h-20 bg-white/10 rounded-md border border-dashed border-white/30 flex items-center justify-center text-gray-500 text-[10px] sm:text-xs">Flop 2</div>
                <div class="w-10 h-14 sm:w-14 sm:h-20 bg-white/10 rounded-md border border-dashed border-white/30 flex items-center justify-center text-gray-500 text-[10px] sm:text-xs">Flop 3</div>
                <div class="w-10 h-14 sm:w-14 sm:h-20 bg-white/10 rounded-md border border-dashed border-white/30 flex items-center justify-center text-gray-500 text-[10px] sm:text-xs">Turn</div>
                <div class="w-10 h-14 sm:w-14 sm:h-20 bg-white/10 rounded-md border border-dashed border-white/30 flex items-center justify-center text-gray-500 text-[10px] sm:text-xs">River</div>
            </div>

        </div>
    </main>

    <footer class="p-6 bg-gray-800 border-t border-gray-700 flex flex-col md:flex-row items-center justify-between gap-6 shadow-2xl">
        
        <div class="flex items-center gap-4">
            <div class="bg-gray-900 p-3 rounded-lg border border-green-500/30 text-center">
                <div class="font-bold text-green-400">😎 Твій Стек</div>
                <div class="text-xl font-black text-yellow-400">1000$</div>
            </div>
            <div id="player-cards" class="flex gap-2">
                <div class="w-14 h-20 bg-white text-black font-bold rounded-md flex items-center justify-center text-lg shadow-md">🂟</div>
                <div class="w-14 h-20 bg-white text-black font-bold rounded-md flex items-center justify-center text-lg shadow-md">🂟</div>
            </div>
        </div>

        <div class="flex flex-wrap gap-3">
            <button id="btn-fold" class="px-6 py-3 bg-red-600 hover:bg-red-700 active:scale-95 font-bold rounded-xl transition shadow-lg cursor-pointer">
                🔴 Fold (Скинути)
            </button>
            <button id="btn-check" class="px-6 py-3 bg-gray-600 hover:bg-gray-500 active:scale-95 font-bold rounded-xl transition shadow-lg cursor-pointer">
                ⚪ Check / Call
            </button>
            <div class="flex items-center bg-gray-900 p-1 rounded-xl border border-gray-700">
                <button id="btn-raise" class="px-6 py-3 bg-yellow-500 hover:bg-yellow-600 active:scale-95 text-black font-black rounded-lg transition shadow-lg cursor-pointer">
                    🔥 Raise
                </button>
                <input type="number" id="raise-amount" value="50" step="25" min="25" class="w-20 bg-transparent text-center font-bold text-yellow-400 focus:outline-none">
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
