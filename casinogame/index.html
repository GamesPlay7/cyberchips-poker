<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberChips Poker Club</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .poker-table {
            background: radial-gradient(circle, #1b4d3e 0%, #0f2e24 100%);
            border: 16px solid #3d2314;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
        }

        /* --- ІДЕАЛЬНА МОБІЛЬНА ПІРАМІДА --- */
        @media (max-width: 768px) {
            .poker-table {
                width: 95% !important;
                height: auto !important;
                min-height: 460px !important;
                margin: 10px auto !important;
                border: 10px solid #3d2314 !important;
                border-radius: 40px !important;
                padding: 16px 10px !important;
                
                /* Робимо 3 чітких ряди: 1-й для Бот 2, 2-й для Бот 1 та 3, 3-й для карт */
                display: grid !important;
                grid-template-columns: repeat(2, 1fr) !important;
                grid-template-rows: auto auto 1fr !important;
                row-gap: 20px !important;
                column-gap: 10px !important;
            }

            /* Скидаємо всі старі абсолютні зсуви для ботів */
            .poker-table > div:nth-child(1),
            .poker-table > div:nth-child(2),
            .poker-table > div:nth-child(3) {
                position: static !important;
                transform: none !important;
                width: 100% !important;
                max-width: 125px !important;
                padding: 6px !important;
                font-size: 11px !important;
            }

            /* РЯД 1: Бот 2 (Профі) — на самому верху по центру (займає 2 колонки) */
            .poker-table > div:nth-child(2) {
                grid-row: 1 !important;
                grid-column: span 2 !important;
                justify-self: center !important;
            }

            /* РЯД 2: Бот 1 (Агресор) — ліворуч під Бот 2 */
            .poker-table > div:nth-child(1) {
                grid-row: 2 !important;
                grid-column: 1 !important;
                justify-self: end !important; /* притискаємо трохи до центру */
                margin-right: 5px !important;
            }

            /* РЯД 2: Бот 3 (Рандом) — праворуч навпроти Бот 1 */
            .poker-table > div:nth-child(3) {
                grid-row: 2 !important;
                grid-column: 2 !important;
                justify-self: start !important; /* притискаємо трохи до центру */
                margin-left: 5px !important;
            }

            /* РЯД 3: КАРТИ СТОЛУ — чітко внизу, по центру, під усіма ботами */
            .poker-table .flex {
                grid-row: 3 !important;
                grid-column: span 2 !important;
                justify-self: center !important;
                align-self: end !important;
                margin-top: 15px !important;
                background: rgba(0, 0, 0, 0.4) !important;
                padding: 6px !important;
                gap: 4px !important;
            }

            /* Оптимальний розмір карт, щоб не вилазили за рамки */
            .poker-table .w-14.h-20 {
                width: 40px !important;
                height: 58px !important;
                font-size: 14px !important;
            }
            .poker-table .text-2xl {
                font-size: 1.1rem !important;
            }
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex flex-col justify-between">

    <header class="p-4 bg-gray-800 border-b border-gray-700 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold tracking-wider text-yellow-400">🎰 CYBERCHIPS POKER</h1>
        <div class="text-sm bg-gray-900 px-4 py-2 rounded-lg border border-gray-600">
            Загальний банк (POT): <span id="total-pot" class="font-bold text-green-400">0$</span>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="poker-table w-full max-w-4xl h-[450px] rounded-[150px] relative flex flex-col items-center justify-center">
            
            <div class="absolute left-6 top-1/2 -translate-y-1/2 text-center bg-black/40 p-3 rounded-lg border border-red-500/30">
                <div class="font-bold text-red-400">🤖 Бот 1 (Агресор)</div>
                <div id="bot1-status" class="text-xs text-gray-400 italic">Чекає...</div>
                <div class="text-sm text-yellow-500">Chips: 1000$</div>
            </div>

            <div class="absolute top-4 left-1/2 -translate-x-1/2 text-center bg-black/40 p-3 rounded-lg border border-blue-500/30">
                <div class="font-bold text-blue-400">🤖 Бот 2 (Профі)</div>
                <div id="bot2-status" class="text-xs text-gray-400 italic">Чекає...</div>
                <div class="text-sm text-yellow-500">Chips: 1000$</div>
            </div>

            <div class="absolute right-6 top-1/2 -translate-y-1/2 text-center bg-black/40 p-3 rounded-lg border border-purple-500/30">
                <div class="font-bold text-purple-400">🤖 Бот 3 (Рандом)</div>
                <div id="bot3-status" class="text-xs text-gray-400 italic">Чекає...</div>
                <div class="text-sm text-yellow-500">Chips: 1000$</div>
            </div>

            <div class="flex gap-2 bg-black/20 p-4 rounded-xl border border-white/5">
                <div class="w-14 h-20 bg-white/10 rounded-md border border-dashed border-white/30 flex items-center justify-center text-gray-500 text-xs">Flop 1</div>
                <div class="w-14 h-20 bg-white/10 rounded-md border border-dashed border-white/30 flex items-center justify-center text-gray-500 text-xs">Flop 2</div>
                <div class="w-14 h-20 bg-white/10 rounded-md border border-dashed border-white/30 flex items-center justify-center text-gray-500 text-xs">Flop 3</div>
                <div class="w-14 h-20 bg-white/10 rounded-md border border-dashed border-white/30 flex items-center justify-center text-gray-500 text-xs">Turn</div>
                <div class="w-14 h-20 bg-white/10 rounded-md border border-dashed border-white/30 flex items-center justify-center text-gray-500 text-xs">River</div>
            </div>

        </div>
    </main>

    <footer class="p-6 bg-gray-800 border-t border-gray-700 flex flex-col md:flex-row items-center justify-between gap-6 shadow-2xl">
        
        <div class="flex items-center gap-4">
            <div class="bg-gray-900 p-3 rounded-lg border border-green-500/30 text-center">
                <div class="font-bold text-green-400">😎 Твій Стек</div>
                <div class="text-xl font-black text-yellow-400">1000$</div>
            </div>
            <div id="player-cards" class="flex gap-2">
                <div class="w-14 h-20 bg-white text-black font-bold rounded-md flex items-center justify-center text-lg shadow-md">🂟</div>
                <div class="w-14 h-20 bg-white text-black font-bold rounded-md flex items-center justify-center text-lg shadow-md">🂟</div>
            </div>
        </div>

        <div class="flex flex-wrap gap-3">
            <button id="btn-fold" class="px-6 py-3 bg-red-600 hover:bg-red-700 active:scale-95 font-bold rounded-xl transition shadow-lg cursor-pointer">
                🔴 Fold (Скинути)
            </button>
            <button id="btn-check" class="px-6 py-3 bg-gray-600 hover:bg-gray-500 active:scale-95 font-bold rounded-xl transition shadow-lg cursor-pointer">
                ⚪ Check / Call
            </button>
            <div class="flex items-center bg-gray-900 p-1 rounded-xl border border-gray-700">
                <button id="btn-raise" class="px-6 py-3 bg-yellow-500 hover:bg-yellow-600 active:scale-95 text-black font-black rounded-lg transition shadow-lg cursor-pointer">
                    🔥 Raise
                </button>
                <input type="number" id="raise-amount" value="50" step="25" min="25" class="w-20 bg-transparent text-center font-bold text-yellow-400 focus:outline-none">
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
