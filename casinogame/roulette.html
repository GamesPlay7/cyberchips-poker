<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberChips — Американська Рулетка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="roulette.css">
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen p-4 relative">

    <div id="auth-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
        <div class="bg-gray-800 border border-gray-700 w-full max-w-sm p-6 rounded-2xl shadow-2xl text-center">
            <h2 id="auth-title" class="text-2xl font-black text-yellow-400 mb-2 uppercase tracking-wide">Вхід у Казино</h2>
            <p id="auth-subtitle" class="text-xs text-gray-400 mb-6">Введіть свій нікнейм та пароль для синхронізації балансу</p>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="block text-gray-400 text-xs mb-1 font-bold">Нікнейм:</label>
                    <input type="text" id="auth-username" placeholder="Наприклад: Neo" class="w-full bg-gray-700 text-white px-4 py-2.5 rounded-xl border border-gray-600 focus:outline-none focus:border-yellow-400 font-bold">
                </div>
                <div>
                    <label class="block text-gray-400 text-xs mb-1 font-bold">Пароль:</label>
                    <input type="password" id="auth-password" placeholder="••••••••" class="w-full bg-gray-700 text-white px-4 py-2.5 rounded-xl border border-gray-600 focus:outline-none focus:border-yellow-400">
                </div>
            </div>

            <p id="auth-error" class="text-red-400 text-xs mt-3 font-bold hidden"></p>

            <button id="auth-submit-btn" onclick="handleAuthSubmit()" class="w-full bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-black py-3 rounded-xl mt-6 uppercase tracking-wider transition-all active:scale-95 shadow-lg shadow-yellow-500/10">Увійти 🚀</button>
            
            <p class="text-xs text-gray-400 mt-4">
                <span id="auth-toggle-desc">Ще не маєте акаунту?</span> 
                <button onclick="toggleAuthMode()" id="auth-toggle-btn" class="text-yellow-400 font-bold underline ml-1 hover:text-yellow-300">Зареєструватися</button>
            </p>
        </div>
    </div>

    <h1 class="text-3xl font-black text-yellow-400 mb-6 text-center uppercase tracking-wider">🎰 Американська Рулетка</h1>

    <div id="profile-panel" class="w-full max-w-md bg-gray-800/80 border border-gray-700 p-4 rounded-xl shadow-md text-center mb-6">
        <div class="flex justify-between items-center px-2">
            <p class="text-base font-medium">Гравець: <span id="user-name" class="font-black text-yellow-400">...</span></p>
            <button onclick="logout()" class="text-xs text-red-400 hover:text-red-300 underline font-bold">Вийти</button>
        </div>
        <p class="text-sm text-gray-400 mt-2 border-t border-gray-700/50 pt-2">
            Взято кредитів: <span id="credits-count" class="font-bold text-yellow-500">0</span> 
            (Борг казино: <span id="debt-amount" class="font-bold text-red-400">0$</span>)
        </p>
        <button id="credit-btn" class="mt-3 bg-red-600 hover:bg-red-700 text-white text-xs font-black py-2 px-4 rounded-lg uppercase tracking-wide transition-all active:scale-95 shadow-lg shadow-red-600/20 hidden">
            💵 Взяти кредит (+1000$)
        </button>
    </div>

    <div class="wheel-wrapper relative flex items-center justify-center mb-8">
        <div class="pointer absolute top-[-15px] z-10 w-0 h-0 border-l-[15px] border-l-transparent border-r-[15px] border-r-transparent border-t-[30px] border-t-yellow-400"></div>
        
        <div id="roulette-wheel" class="w-80 h-80 sm:w-96 sm:h-96 rounded-full border-4 border-yellow-500 shadow-2xl relative overflow-hidden bg-green-800 transition-transform duration-[5s] ease-out">
        </div>
        
        <div class="absolute w-16 h-16 bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-full border-2 border-gray-900 shadow-md flex items-center justify-center font-black text-gray-900 text-xs">CYBER</div>
    </div>

    <div class="w-full max-w-md bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg text-center">
        <div class="mb-4 text-xl font-bold text-gray-300">Твій баланс: <span id="balance-display" class="text-yellow-400">0$</span></div>

        <div class="mb-4">
            <label class="block text-gray-400 text-sm mb-1">Сума ставки ($):</label>
            <input type="number" id="bet-amount" value="50" min="1" class="w-full bg-gray-700 text-white text-center font-bold py-2 rounded-lg border border-gray-600 focus:outline-none focus:border-yellow-400">
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="setBetType('red')" id="bet-red" class="bg-red-600 hover:bg-red-700 font-bold py-3 rounded-lg border-2 border-transparent transition-all">🔴 Червоне (x2)</button>
            <button onclick="setBetType('black')" id="bet-black" class="bg-gray-900 hover:bg-black font-bold py-3 rounded-lg border-2 border-transparent transition-all">⚫ Чорне (x2)</button>
            <button onclick="setBetType('even')" id="bet-even" class="bg-blue-600 hover:bg-blue-700 font-bold py-2 rounded-lg border-2 border-transparent transition-all">Парне (x2)</button>
            <button onclick="setBetType('odd')" id="bet-odd" class="bg-indigo-600 hover:bg-indigo-700 font-bold py-2 rounded-lg border-2 border-transparent transition-all">Непарне (x2)</button>
        </div>

        <div class="mb-6 bg-gray-700/50 p-3 rounded-lg border border-gray-600">
            <label class="block text-gray-400 text-xs mb-1">Або постав на число (0, 00 або 1-36) за коефіцієнт x36! 🔥</label>
            <input type="text" id="bet-number-val" placeholder="Наприклад: 23 чи 00" class="w-1/2 bg-gray-800 text-center text-sm py-1.5 rounded border border-gray-600 focus:outline-none focus:border-yellow-400 uppercase font-bold">
        </div>

        <button id="spin-btn" onclick="spinWheel()" class="w-full bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-black py-4 rounded-xl text-lg uppercase tracking-wider transition-transform active:scale-95 shadow-lg shadow-yellow-500/20">Крутити колесо! 🚀</button>
    </div>

    <div id="roulette-log" class="mt-6 w-full max-w-md bg-black/40 p-4 rounded-lg border border-gray-800 h-28 overflow-y-auto text-xs text-gray-400 font-mono">
        <div>• Ласкаво просимо до Американської Рулетки! Оберіть ставку.</div>
    </div>

    <script src="roulette.js"></script>
</body>
</html>
